aid: blynk
name: Blynk
description: >-
  Blynk is a low-code / no-code IoT software platform that helps companies
  prototype, deploy, and remotely manage connected devices and applications
  across consumer and commercial markets. The platform combines four
  components — Blynk.Console (web dashboard), Blynk.Apps (white-labeled
  iOS and Android apps), Blynk.Edgent (device-side connection library),
  and Blynk.Cloud (managed backend) — into a full-stack offering that
  removes the need to build custom IoT infrastructure. Developers can
  build interactive mobile and web dashboards with a drag-and-drop
  builder, connect hardware over Wi-Fi, Cellular, LoRaWAN, Ethernet, or
  satellite, and operate fleets with provisioning, OTA firmware updates,
  multi-tenancy, automations, webhooks, and SOC 2 cloud infrastructure.
  Commercial customers use Blynk for branded consumer products,
  industrial monitoring, agriculture, energy and HVAC, smart cities, and
  smart buildings, with more than 5,000 companies and 1M+ developers on
  the platform. Blynk exposes two HTTPS REST APIs — the Device HTTPS
  API for telemetry and command exchange from individual hardware units,
  and the Platform HTTPS API (Enterprise plan) for full programmatic
  CRUD over devices, users, organizations, templates, automations,
  webhooks, and tags using OAuth2 client-credential authentication.
