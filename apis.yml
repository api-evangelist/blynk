    description: >-
      Token-authenticated HTTPS REST API used by individual devices to read
      and write datastream values, batch update multiple datastreams,
      retrieve historical data, set widget and datastream properties,
      trigger log events, upload files, and read or update device
      metadata. Base URL is https://{server}.blynk.cloud/external/api,
      and requests authenticate via a per-device token. Commonly used by
      MCU firmware (Arduino, ESP32, ESP8266, Raspberry Pi, Particle)
      when the Blynk Library streaming protocol is not in use.
