    description: >-
      Enterprise-tier OAuth2 REST API for full programmatic CRUD across
      Blynk Cloud tenancy. Resources include devices (create from
      template, list, search, online status, tags, timeline, update,
      delete), users (list, search, invite, register, transfer, role
      updates, push notifications), organizations and sub-organizations,
      templates, automations, webhooks, and tags. Authentication uses
      OAuth2 client credentials issued in Blynk.Console, exchanged via
      POST /oauth2/token for a bearer access token, and requests are
      rate-limited to 10,000 per minute per organization. Resource
      identifiers are supplied as query parameters.
  - aid: blynk:blynk-device-streaming-protocol
    name: Blynk Device Streaming Protocol
    tags:
      - IoT
      - Streaming
      - Real Time
      - Bidirectional
      - Firmware
      - Embedded
    humanURL: https://docs.blynk.io/en/getting-started/intro
    properties:
      - url: https://docs.blynk.io/en/blynk-library-firmware-api
        type: Documentation
        name: Blynk Library Firmware API
      - url: https://github.com/blynkkk/blynk-library
        type: SourceCode
        name: blynk-library (C++)
    description: >-
      Bi-directional low-latency streaming connection protocol used by
      the Blynk Library and Blynk.Edgent to maintain a persistent link
      between devices and Blynk.Cloud. Optimized for constrained MCUs
      (Arduino, ESP32, ESP8266, Particle, Raspberry Pi), the protocol
      delivers virtual-pin reads and writes, widget property updates,
      and remote commands without the overhead of polling the HTTPS
      Device API. Surfaced to firmware developers as the Blynk Library
      C++ API.
